# This workflow sets up GitHub runners and runs unit tests
# Triggered on pull requests, pushes to master and manual trigger from github web

# Triggers
name: tests
on:
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
          - info
          - warning
          - debug

  pull_request:
    branches:
      - master
    types:
      - opened
      - reopened
      - synchronize

  pull_request_review:
    types:
      - submitted

  push:
    branches:
      - master

# Cancel previous workflows on the same pull request
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Single source of truth for CI matrix sizes.
# Fast CI: ubuntu-latest + 3.12 only. Full CI: all OS/Python combos.
env:
  FAST_MATRIX: '{"os":["ubuntu-latest"],"python-version":["3.12"]}'
  FULL_MATRIX: '{"os":["ubuntu-latest","macos-latest","windows-latest"],"python-version":["3.9","3.10","3.11","3.12","3.13","3.14"]}'

jobs:

  # Selects fast or full matrix based on PR approval.
  setup:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request_review' || github.event.review.state == 'approved'
    outputs:
      pip-matrix: ${{ steps.pick.outputs.pip-matrix }}
    steps:
      - id: pick
        run: |
          if [[ "${{ github.event.action }}" == "submitted" && \
                "${{ github.event.review.state }}" == "approved" ]]; then
            echo "pip-matrix=$FULL_MATRIX" >> $GITHUB_OUTPUT
          else
            echo "pip-matrix=$FAST_MATRIX" >> $GITHUB_OUTPUT
          fi

  #        _
  #  _ __ (_)_ __
  #  | '_ \| | '_ \
  #  | |_) | | |_) |
  #  | .__/|_| .__/
  #  |_|     |_|

  build-and-test-pip:
    needs: setup
    name: pip (${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.pip-matrix) }}

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          check-latest: true
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - uses: ./.github/actions/restore-elephant-data

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[extras,tests]

      - name: List packages
        run: |
          pip list
          python --version

      - name: Test with pytest
        shell: bash
        run: pytest --cov=elephant --cov-report=lcov:coverage.lcov

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          flag-name: py${{ matrix.python-version }}-${{ matrix.os }}
          parallel: true
          file: coverage.lcov

  #  __  __ ____ ___
  # |  \/  |  _ \_ _|
  # | |\/| | |_) | |
  # | |  | |  __/| |
  # |_|  |_|_|  |___|

  # install dependencies and elephant with pip and run MPI
  test-pip-MPI:
    needs: setup
    name: mpi (${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.12"]
        os: [ubuntu-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          check-latest: true
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - uses: ./.github/actions/restore-elephant-data

      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt install -y libopenmpi-dev openmpi-bin
          python -m pip install --upgrade pip
          pip install mpi4py
          pip install -e .[extras,tests]

      - name: List packages
        run: |
          pip list
          python --version

      - name: Test with pytest
        run: mpiexec -n 1 python -m mpi4py -m pytest --cov=elephant --cov-report=lcov:coverage.lcov

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          flag-name: mpi
          parallel: true
          file: coverage.lcov

  #   ____                _
  #  / ___|___  _ __   __| | __ _
  # | |   / _ \| '_ \ / _` |/ _` |
  # | |__| (_) | | | | (_| | (_| |
  #  \____\___/|_| |_|\__,_|\__,_|

  test-conda:
    needs: setup
    name: conda (${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: [3.12]
        os: [ubuntu-latest]
      fail-fast: false

    steps:
      - name: Get current year-month
        id: date
        run: echo "date=$(date +'%Y-%m')" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v6.0.2

      - name: Get pip cache dir
        id: pip-cache
        run: |
          echo "dir=$(pip cache dir)" >> $GITHUB_OUTPUT

      - name: Cache pip
        uses: actions/cache@v5.0.5
        with:
          path: ${{ steps.pip-cache.outputs.dir }}

          key: ${{ runner.os }}-pip-${{hashFiles('requirements/environment-tests.yml') }}-${{ hashFiles('**/CI.yml') }}-${{ steps.date.outputs.date }}


      - uses: ./.github/actions/restore-elephant-data

      - uses: mamba-org/setup-micromamba@v3.0.0
        with:
          create-args: python=${{ matrix.python-version }}
          environment-file: requirements/environment-tests.yml
          init-shell: bash

      - name: Install dependencies
        shell: bash -el {0}
        run: |
          python --version
          pip install -e .

      - name: List packages
        shell: bash -el {0}
        run: |
          pip list
          micromamba list

      - name: Test with pytest
        shell: bash -el {0}
        run: pytest

  #  ____
  # |  _ \  ___   ___ ___
  # | | | |/ _ \ / __/ __|
  # | |_| | (_) | (__\__ \
  # |____/ \___/ \___|___/

  docs:
    needs: setup
    name: docs (${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: [3.12]
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          check-latest: true
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        shell: bash -el {0}
        run: |
          sudo apt-get update
          sudo apt install -y libopenmpi-dev openmpi-bin pandoc
          python -m pip install --upgrade pip
          pip install mpi4py
          pip install -e .[extras,tutorials,docs]
          sed -i -E "s/nbsphinx_execute *=.*/nbsphinx_execute = 'always'/g" doc/conf.py

      - name: List packages
        run: |
          pip list
          python --version

      - name: make html
        run: |
          cd doc
          make html

#  _____               _______        _
# |  __ \  ___   ___  |__   __|   ___| |_ ___
# | |  | |/ _ \ / __|    | |/ _ \/ __| __/ __|
# | |__| | (_) | (__     | |  __/\__ \ |_\__ \
# |_____/ \___/ \___|    |_|\___||___/\__|___/
  doctests:
    needs: setup
    name: doctests (${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.12"]
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          check-latest: true
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt install -y libopenmpi-dev openmpi-bin
          python -m pip install --upgrade pip
          pip install mpi4py
          pip install -e .[extras,tests]

      - name: List packages
        run: |
          pip list
          python --version

      - name: Run doctests
        run: |
          printf "def pytest_configure(config):\n    import numpy as np\n    import builtins\n    np.set_printoptions(legacy='1.25')\n    builtins.np = np\n" > conftest.py
          pytest elephant --doctest-modules --ignore=elephant/test/ --cov=elephant --cov-report=lcov:coverage.lcov

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          flag-name: doctests
          parallel: true
          file: coverage.lcov


  # Coveralls Finish Job
  # Combine coverals report and make PR comment
  coveralls-finish:
    needs: [build-and-test-pip, test-pip-MPI, doctests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Coveralls finished
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true
